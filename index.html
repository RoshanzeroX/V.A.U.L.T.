<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V.A.U.L.T.</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    function formatCurrency(value) {
        return new Intl.NumberFormat("th-TH").format(value || 0);
    }

    function buildMonthKey(date) {
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
    }

    function getMonthLabel(month) {
        const [year, monthNumber] = month.split("-").map(Number);
        const date = new Date(year, monthNumber - 1, 1);
        return new Intl.DateTimeFormat("th-TH", {
            month: "long",
            year: "numeric",
        }).format(date);
    }

    function escapeCSV(value) {
        const text = String(value ?? "");
        return `"${text.replace(/"/g, '""')}"`;
    }

    function createEntryId() {
        if (window.crypto?.randomUUID) return window.crypto.randomUUID();
        return `entry-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
    }

    function normalizeMonthData(raw) {
        if (!raw || typeof raw !== "object" || Array.isArray(raw)) return {};

        const normalized = {};
        Object.entries(raw).forEach(([dayKey, entries]) => {
            if (!Array.isArray(entries)) return;

            normalized[dayKey] = entries
                .filter((entry) => entry && typeof entry === "object")
                .map((entry) => ({
                    id: entry.id || createEntryId(),
                    text: typeof entry.text === "string" ? entry.text : "",
                    amount: Number(entry.amount) || 0,
                    type: entry.type === "income" ? "income" : "expense",
                }));
        });

        return normalized;
    }

    function LineChart({ data }) {
        const ref = useRef(null);

        useEffect(() => {
            const canvas = ref.current;
            if (!canvas) return;

            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, 320, 180);
            if (data.length === 0) return;

            const max = Math.max(...data);
            const min = Math.min(...data);
            const range = (max - min) || 1;

            ctx.beginPath();
            const strokeGradient = ctx.createLinearGradient(0, 0, 320, 0);
            strokeGradient.addColorStop(0, "#8b5cf6");
            strokeGradient.addColorStop(0.5, "#38bdf8");
            strokeGradient.addColorStop(1, "#22c55e");
            ctx.strokeStyle = strokeGradient;
            ctx.lineWidth = 4;
            ctx.lineJoin = "round";
            ctx.lineCap = "round";

            data.forEach((value, index) => {
                const x = data.length === 1 ? 160 : (index / (data.length - 1)) * 320;
                const y = 150 - ((value - min) / range) * 110;
                if (index === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();

            ctx.lineTo(320, 180);
            ctx.lineTo(0, 180);
            ctx.closePath();

            const fillGradient = ctx.createLinearGradient(0, 0, 0, 180);
            fillGradient.addColorStop(0, "rgba(139, 92, 246, 0.32)");
            fillGradient.addColorStop(0.7, "rgba(56, 189, 248, 0.08)");
            fillGradient.addColorStop(1, "rgba(34, 197, 94, 0)");
            ctx.fillStyle = fillGradient;
            ctx.fill();
        }, [data]);

        return (
            <div className="chart-shell">
                <canvas ref={ref} width="320" height="180" style={{ width: "100%", height: "180px" }} />
            </div>
        );
    }

    function App() {
        const today = new Date();
        const [month, setMonth] = useState(buildMonthKey(today));
        const [day, setDay] = useState(today.getDate());
        const [data, setData] = useState({});
        const [text, setText] = useState("");
        const [amount, setAmount] = useState("");
        const [search, setSearch] = useState("");
        const [editId, setEditId] = useState(null);
        const [message, setMessage] = useState({ type: "", text: "" });

        const [year, monthNumber] = month.split("-").map(Number);
        const days = new Date(year, monthNumber, 0).getDate();

        useEffect(() => {
            if (day > days) {
                setDay(days);
                setEditId(null);
            }
        }, [day, days]);

        useEffect(() => {
            const saved = localStorage.getItem(month);
            if (!saved) {
                setData({});
                setEditId(null);
                return;
            }

            try {
                const parsed = JSON.parse(saved);
                setData(normalizeMonthData(parsed));
            } catch {
                setData({});
                setMessage({
                    type: "warning",
                    text: "ข้อมูลเดือนนี้อ่านไม่ได้ ระบบรีเซ็ตเป็นค่าว่างให้แล้ว",
                });
            }

            setEditId(null);
        }, [month]);

        useEffect(() => {
            localStorage.setItem(month, JSON.stringify(data));
        }, [data, month]);

        useEffect(() => {
            if (!message.text) return;
            const timer = window.setTimeout(() => {
                setMessage({ type: "", text: "" });
            }, 2600);
            return () => window.clearTimeout(timer);
        }, [message]);

        const allItems = useMemo(() => Object.values(data).flat(), [data]);
        const totalIn = useMemo(
            () => allItems.filter((entry) => entry.type === "income").reduce((sum, entry) => sum + entry.amount, 0),
            [allItems]
        );
        const totalOut = useMemo(
            () => allItems.filter((entry) => entry.type === "expense").reduce((sum, entry) => sum + entry.amount, 0),
            [allItems]
        );
        const balance = totalIn - totalOut;

        const dailyBalances = Array.from({ length: days }, (_, index) => {
            return (data[index + 1] || []).reduce((sum, entry) => {
                return sum + (entry.type === "expense" ? -entry.amount : entry.amount);
            }, 0);
        });

        let runningBalance = 0;
        const chartData = dailyBalances.map((value) => {
            runningBalance += value;
            return runningBalance;
        });

        const selectedItems = data[day] || [];
        const editingEntry = selectedItems.find((item) => item.id === editId) || null;
        const filteredItems = selectedItems.filter((item) =>
            item.text.toLowerCase().includes(search.toLowerCase())
        );

        const incomeCount = allItems.filter((entry) => entry.type === "income").length;
        const expenseCount = allItems.filter((entry) => entry.type === "expense").length;
        const activeDays = Object.keys(data).filter((key) => (data[key] || []).length > 0).length;

        const addOrUpdate = (type) => {
            const parsedAmount = Number(amount);

            if (!amount.trim()) {
                setMessage({ type: "error", text: "กรุณากรอกจำนวนเงินก่อนบันทึก" });
                return;
            }

            if (Number.isNaN(parsedAmount) || parsedAmount <= 0) {
                setMessage({ type: "error", text: "จำนวนเงินต้องมากกว่า 0" });
                return;
            }

            if (day < 1 || day > days) {
                setMessage({ type: "error", text: "กรุณาเลือกวันที่ที่ถูกต้องก่อน" });
                return;
            }

            const nextData = { ...data };
            const dayItems = [...(nextData[day] || [])];
            const defaultLabel = type === "income" ? "รายรับ" : "รายจ่าย";
            const nextItem = {
                id: editId || createEntryId(),
                text: text.trim() || defaultLabel,
                amount: parsedAmount,
                type,
            };

            if (editId) {
                const targetIndex = dayItems.findIndex((item) => item.id === editId);
                if (targetIndex === -1) {
                    setMessage({ type: "error", text: "ไม่พบรายการที่ต้องการแก้ไขแล้ว" });
                    setEditId(null);
                    return;
                }
                dayItems[targetIndex] = nextItem;
            } else {
                dayItems.push(nextItem);
            }

            nextData[day] = dayItems;
            setData(nextData);
            setText("");
            setAmount("");
            setEditId(null);
            setMessage({
                type: "success",
                text: editId ? "อัปเดตรายการเรียบร้อย" : "บันทึกรายการเรียบร้อย",
            });
        };

        const startEdit = (entryId) => {
            const item = (data[day] || []).find((entry) => entry.id === entryId);
            if (!item) {
                setMessage({ type: "error", text: "ไม่พบรายการสำหรับแก้ไข" });
                return;
            }

            setText(item.text);
            setAmount(String(item.amount));
            setEditId(item.id);
            setMessage({ type: "info", text: `กำลังแก้ไขรายการ "${item.text}"` });
            document.getElementById("entry-form")?.scrollIntoView({ behavior: "smooth", block: "center" });
        };

        const remove = (entryId) => {
            const currentItems = [...(data[day] || [])];
            const targetIndex = currentItems.findIndex((item) => item.id === entryId);
            if (targetIndex === -1) return;
            if (!window.confirm("ลบรายการนี้ใช่ไหม?")) return;

            currentItems.splice(targetIndex, 1);
            const nextData = { ...data };
            if (currentItems.length === 0) delete nextData[day];
            else nextData[day] = currentItems;

            if (editId === entryId) {
                setEditId(null);
                setText("");
                setAmount("");
            }

            setData(nextData);
            setMessage({ type: "success", text: "ลบรายการเรียบร้อย" });
        };

        const exportCSV = () => {
            const rows = [["วันที่", "รายละเอียด", "ประเภท", "จำนวนเงิน"]];

            Object.keys(data)
                .sort((a, b) => Number(a) - Number(b))
                .forEach((dateKey) => {
                    (data[dateKey] || []).forEach((item) => {
                        rows.push([
                            `${month}-${String(dateKey).padStart(2, "0")}`,
                            item.text,
                            item.type === "income" ? "รายรับ" : "รายจ่าย",
                            item.amount,
                        ]);
                    });
                });

            const csv = "\uFEFF" + rows.map((row) => row.map(escapeCSV).join(",")).join("\n");
            const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `vault-${month}.csv`;
            link.click();
            URL.revokeObjectURL(link.href);
        };

        return (
            <main className="app-shell">
                <section className="hero-card">
                    <div className="hero-orb hero-orb-a"></div>
                    <div className="hero-orb hero-orb-b"></div>
                    <div className="hero-copy">
                        <span className="eyebrow">Virtual Assistant for Ultimate Ledger Tracking</span>
                        <h1>V.A.U.L.T.</h1>
                        <p>ผู้ช่วยบันทึกรายรับรายจ่ายที่สรุปภาพรวมทั้งเดือนได้ในจังหวะเดียว พร้อมฟอร์มที่แก้ไขรายการได้ลื่นและชัดเจนขึ้น</p>
                        <div className="hero-chips">
                            <span className="hero-chip">Track daily cashflow</span>
                            <span className="hero-chip">Edit in place</span>
                            <span className="hero-chip">Monthly snapshot</span>
                        </div>
                    </div>

                    <div className="hero-balance">
                        <span>ยอดคงเหลือเดือนนี้</span>
                        <strong>{formatCurrency(balance)} บาท</strong>
                        <small>{getMonthLabel(month)}</small>
                        <div className="mini-stats">
                            <div className="mini-stat">
                                <span>Active days</span>
                                <strong>{activeDays}</strong>
                            </div>
                            <div className="mini-stat">
                                <span>Entries</span>
                                <strong>{allItems.length}</strong>
                            </div>
                        </div>
                    </div>
                </section>

                {message.text && (
                    <div className={`notice notice-${message.type || "info"}`}>
                        {message.text}
                    </div>
                )}

                <section className="dashboard-grid">
                    <div className="glass feature-panel">
                        <div className="section-head">
                            <div>
                                <span className="section-kicker">Overview</span>
                                <h2>ภาพรวมการเงิน</h2>
                            </div>
                            <button className="btn-export" type="button" onClick={exportCSV}>ส่งออก CSV</button>
                        </div>
                        <LineChart data={chartData} />
                        <div className="summary-grid">
                            <div className="stat-box income">
                                <span className="stat-label">รายรับรวม</span>
                                <strong className="stat-value">+ {formatCurrency(totalIn)}</strong>
                                <small>{incomeCount} รายการ</small>
                            </div>
                            <div className="stat-box expense">
                                <span className="stat-label">รายจ่ายรวม</span>
                                <strong className="stat-value">- {formatCurrency(totalOut)}</strong>
                                <small>{expenseCount} รายการ</small>
                            </div>
                        </div>
                    </div>

                    <div className="glass calendar-panel">
                        <div className="section-head compact">
                            <div>
                                <span className="section-kicker">Calendar</span>
                                <h2>เลือกวัน</h2>
                            </div>
                            <input
                                className="month-input"
                                type="month"
                                value={month}
                                onChange={(event) => setMonth(event.target.value)}
                            />
                        </div>
                        <div className="selected-day">
                            <span>วันที่ที่เลือก</span>
                            <strong>{day} / {monthNumber}</strong>
                        </div>
                        <div className="day-grid">
                            {Array.from({ length: days }, (_, index) => {
                                const date = index + 1;
                                const hasEntries = (data[date] || []).length > 0;
                                return (
                                    <button
                                        key={date}
                                        type="button"
                                        className={`day ${day === date ? "active" : ""} ${hasEntries ? "has-data" : ""}`}
                                        onClick={() => setDay(date)}
                                    >
                                        <span>{date}</span>
                                        {hasEntries && <small>{data[date].length}</small>}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </section>

                <section className="content-grid">
                    <div className={`glass form-panel ${editId ? "editing" : ""}`} id="entry-form">
                        <div className="section-head compact">
                            <div>
                                <span className="section-kicker">Entry Form</span>
                                <h2>{editId ? "แก้ไขรายการ" : `เพิ่มรายการวันที่ ${day}`}</h2>
                            </div>
                            {editId && (
                                <button
                                    className="ghost-button"
                                    type="button"
                                    onClick={() => {
                                        setEditId(null);
                                        setText("");
                                        setAmount("");
                                    }}
                                >
                                    ยกเลิกแก้ไข
                                </button>
                            )}
                        </div>

                        {editingEntry && (
                            <div className="edit-banner">
                                <span>Editing now</span>
                                <strong>{editingEntry.text}</strong>
                            </div>
                        )}

                        <label className="field">
                            <span>รายละเอียด</span>
                            <input
                                value={text}
                                onChange={(event) => setText(event.target.value)}
                                placeholder="เช่น เงินเดือน, ค่าอาหาร, ค่าน้ำมัน"
                            />
                        </label>

                        <label className="field">
                            <span>จำนวนเงิน</span>
                            <input
                                type="number"
                                inputMode="decimal"
                                min="0"
                                step="0.01"
                                value={amount}
                                onChange={(event) => setAmount(event.target.value)}
                                placeholder="0.00"
                            />
                        </label>

                        <div className="action-row">
                            <button type="button" className="btn-income" onClick={() => addOrUpdate("income")}>
                                + บันทึกรายรับ
                            </button>
                            <button type="button" className="btn-expense" onClick={() => addOrUpdate("expense")}>
                                - บันทึกรายจ่าย
                            </button>
                        </div>
                        <p className="form-hint">ถ้าไม่กรอกรายละเอียด ระบบจะใส่ชื่อประเภทให้อัตโนมัติ</p>
                    </div>

                    <div className="glass list-panel">
                        <div className="section-head compact">
                            <div>
                                <span className="section-kicker">Daily Items</span>
                                <h2>รายการของวันที่ {day}</h2>
                            </div>
                            <span className="badge">{selectedItems.length} รายการ</span>
                        </div>

                        <input
                            className="search-bar"
                            placeholder="ค้นหารายการของวันนี้"
                            value={search}
                            onChange={(event) => setSearch(event.target.value)}
                        />

                        <div className="list-stack">
                            {filteredItems.map((item) => (
                                <article key={item.id} className={`item-card ${editId === item.id ? "active-edit" : ""}`}>
                                    <div className="item-copy">
                                        <span className="item-title">{item.text}</span>
                                        <span className={`item-pill ${item.type}`}>{item.type === "income" ? "รายรับ" : "รายจ่าย"}</span>
                                    </div>
                                    <div className="item-side">
                                        <strong className={`item-amount ${item.type}`}>
                                            {item.type === "income" ? "+" : "-"} {formatCurrency(item.amount)}
                                        </strong>
                                        <div className="actions">
                                            <button type="button" className="btn-sm" onClick={() => startEdit(item.id)}>แก้ไข</button>
                                            <button type="button" className="btn-sm btn-del" onClick={() => remove(item.id)}>ลบ</button>
                                        </div>
                                    </div>
                                </article>
                            ))}

                            {filteredItems.length === 0 && (
                                <div className="empty-state">
                                    <strong>ยังไม่มีรายการที่แสดง</strong>
                                    <p>เพิ่มรายการใหม่ หรือปรับคำค้นหาเพื่อดูข้อมูลของวันนี้</p>
                                </div>
                            )}
                        </div>
                    </div>
                </section>
            </main>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
    </script>
</body>
</html>
