<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Budget Planner</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/recharts/umd/Recharts.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(135deg, #dfe9f3, #ffffff);
    }

    .glass {
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      background: #4f46e5;
      color: white;
      cursor: pointer;
    }

    h1, h2 {
      text-align: center;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { PieChart, Pie, Cell, Tooltip, ResponsiveContainer } = Recharts;

    function App() {
      const [income, setIncome] = React.useState(0);
      const [expenses, setExpenses] = React.useState([]);
      const [amount, setAmount] = React.useState("");
      const [category, setCategory] = React.useState("Food");

      const categories = ["Food", "Transport", "Rent", "Shopping", "Other"];

      const addExpense = () => {
        if (!amount) return;
        setExpenses([...expenses, { amount: Number(amount), category }]);
        setAmount("");
      };

      const totalExpense = expenses.reduce((sum, e) => sum + e.amount, 0);
      const balance = income - totalExpense;

      const data = Object.values(
        expenses.reduce((acc, curr) => {
          acc[curr.category] = acc[curr.category] || { name: curr.category, value: 0 };
          acc[curr.category].value += curr.amount;
          return acc;
        }, {})
      );

      return (
        <div className="container">
          <h1>💰 Budget Planner</h1>

          <div className="glass">
            <h2>Income</h2>
            <input
              type="number"
              placeholder="Enter income"
              onChange={(e) => setIncome(Number(e.target.value))}
            />
          </div>

          <div className="glass" style={{marginTop: 20}}>
            <h2>Add Expense</h2>
            <input
              placeholder="Amount"
              value={amount}
              onChange={(e) => setAmount(e.target.value)}
            />

            <select value={category} onChange={(e) => setCategory(e.target.value)}>
              {categories.map(c => <option key={c}>{c}</option>)}
            </select>

            <button onClick={addExpense}>Add Expense</button>
          </div>

          <div className="glass" style={{marginTop: 20}}>
            <h2>Summary</h2>
            <p>Expense: {totalExpense}</p>
            <p>Balance: {balance}</p>
          </div>

          <div className="glass" style={{marginTop: 20, height: 300}}>
            <ResponsiveContainer>
              <PieChart>
                <Pie data={data} dataKey="value" nameKey="name" outerRadius={100}>
                  {data.map((_, i) => <Cell key={i} />)}
                </Pie>
                <Tooltip />
              </PieChart>
            </ResponsiveContainer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
