<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V.A.U.L.T. Pro Max</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
    
    // --- นำ LineChart กลับมาแล้วครับ ---
    function LineChart({data}){
        const ref = React.useRef();
        React.useEffect(() => {
            const ctx = ref.current.getContext("2d");
            ctx.clearRect(0, 0, 300, 150);
            if(data.length === 0) return;

            const max = Math.max(...data);
            const min = Math.min(...data);
            const range = (max - min) || 1;

            // วาดเส้นกราฟ
            ctx.beginPath();
            const gradient = ctx.createLinearGradient(0, 0, 300, 0);
            gradient.addColorStop(0, "#6366f1");
            gradient.addColorStop(1, "#a855f7");
            
            ctx.strokeStyle = gradient;
            ctx.lineWidth = 4;
            ctx.lineJoin = "round";
            ctx.lineCap = "round";

            data.forEach((v, i) => {
                const x = (i / (data.length - 1)) * 300;
                const y = 150 - ((v - min) / range) * 110 - 20;
                if(i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();

            // ใส่เงาใต้เส้น (Area Effect)
            ctx.lineTo(300, 150);
            ctx.lineTo(0, 150);
            ctx.fillStyle = "rgba(99, 102, 241, 0.1)";
            ctx.fill();
        }, [data]);

        return (
            <div style={{marginTop: '10px'}}>
                <canvas ref={ref} width="300" height="150" style={{width:'100%', height:'150px'}} />
            </div>
        );
    }

    function App(){
        const today = new Date();
        const [month, setMonth] = React.useState(today.toISOString().slice(0, 7));
        const [day, setDay] = React.useState(today.getDate());
        const [data, setData] = React.useState({});
        const [text, setText] = React.useState("");
        const [amount, setAmount] = React.useState("");
        const [search, setSearch] = React.useState("");
        const [editIndex, setEditIndex] = React.useState(null);

        const days = new Date(month.split("-")[0], month.split("-")[1], 0).getDate();

        React.useEffect(() => {
            const saved = localStorage.getItem(month);
            setData(saved ? JSON.parse(saved) : {});
        }, [month]);

        React.useEffect(() => {
            localStorage.setItem(month, JSON.stringify(data));
        }, [data, month]);

        const addOrUpdate = (type) => {
            if(!amount || isNaN(amount)) return;
            const d = { ...data };
            if(!d[day]) d[day] = [];

            if (editIndex !== null) {
                d[day][editIndex] = { text: text || d[day][editIndex].text, amount: Number(amount), type };
                setEditIndex(null);
            } else {
                d[day].push({ text: text || (type === "income" ? "รายรับ" : "รายจ่าย"), amount: Number(amount), type });
            }
            setData(d); setText(""); setAmount("");
        };

        const startEdit = (i) => {
            const item = data[day][i];
            setText(item.text);
            setAmount(item.amount);
            setEditIndex(i);
            window.scrollTo({ top: 400, behavior: 'smooth' }); // เลื่อนไปที่ฟอร์มกรอก
        };

        const remove = (i) => {
            if(confirm("ลบรายการนี้?")) {
                const d = {...data};
                d[day].splice(i,1);
                setData({...d});
            }
        };

        const exportCSV = () => {
            let csv = "\uFEFFวันที่,รายละเอียด,ประเภท,จำนวน\n";
            Object.keys(data).sort().forEach(d => {
                data[d].forEach(item => {
                    csv += `${d},${item.text},${item.type === 'income' ? 'รายรับ' : 'รายจ่าย'},${item.amount}\n`;
                });
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `V.A.U.L.T_${month}.csv`;
            link.click();
        };

        const allItems = Object.values(data).flat();
        const totalIn = allItems.filter(e => e.type === "income").reduce((s, e) => s + e.amount, 0);
        const totalOut = allItems.filter(e => e.type === "expense").reduce((s, e) => s + e.amount, 0);

        // คำนวณข้อมูลกราฟ (Daily Cumulative)
        const dailyBalances = Array.from({ length: days }, (_, i) => {
            return (data[i+1] || []).reduce((s, e) => s + (e.type === "expense" ? -e.amount : e.amount), 0);
        });
        let run = 0;
        const chartData = dailyBalances.map(v => { run += v; return run; });

        const filteredItems = (data[day] || []).filter(item => 
            item.text.toLowerCase().includes(search.toLowerCase())
        );

        return (
            <div className="container">
                <h2>💎 V.A.U.L.T.</h2>

                {/* สรุปยอดเงิน & กราฟ */}
                <div className="glass" style={{background: 'rgba(99, 102, 241, 0.2)'}}>
                    <div style={{textAlign: 'center', marginBottom: '15px'}}>
                        <div className="stat-label">เงินคงเหลือเดือนนี้</div>
                        <div style={{fontSize: '2.2rem', fontWeight: 'bold'}}>฿ {(totalIn - totalOut).toLocaleString()}</div>
                    </div>
                    <LineChart data={chartData} />
                    <div className="summary-grid">
                        <div className="stat-box"><div className="stat-label">รายรับ</div><div className="stat-value" style={{color: '#4ade80'}}>+{totalIn.toLocaleString()}</div></div>
                        <div className="stat-box"><div className="stat-label">รายจ่าย</div><div className="stat-value" style={{color: '#fb7185'}}>-{totalOut.toLocaleString()}</div></div>
                    </div>
                    <button className="btn-export" onClick={exportCSV}>📥 ดาวน์โหลดรายงาน (CSV)</button>
                </div>

                {/* ปฏิทินเลือกวัน */}
                <div className="glass">
                    <input type="month" value={month} onChange={e => setMonth(e.target.value)} style={{marginBottom:'15px'}} />
                    <div className="day-grid">
                        {Array.from({ length: days }, (_, i) => (
                            <div key={i} className={`day ${day===i+1?'active':''} ${(data[i+1]||[]).length>0?'has-data':''}`} onClick={()=>setDay(i+1)}>
                                {i+1}
                            </div>
                        ))}
                    </div>
                </div>

                {/* ฟอร์มเพิ่ม/แก้ไข */}
                <div className="glass" id="input-form">
                    <h3 style={{margin:'0 0 12px 0', fontSize:'1rem', opacity:0.8}}>
                        {editIndex !== null ? '📝 แก้ไขรายการ' : `➕ เพิ่มรายการวันที่ ${day}`}
                    </h3>
                    <div className="input-row">
                        <input value={text} onChange={e=>setText(e.target.value)} placeholder="รายละเอียด" />
                        <input type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="฿" style={{width:'110px'}} />
                    </div>
                    <div style={{display:'flex', gap:'8px'}}>
                        <button className="btn-income" onClick={()=>addOrUpdate("income")}>{editIndex !== null ? 'บันทึกใหม่' : 'รายรับ'}</button>
                        <button className="btn-expense" onClick={()=>addOrUpdate("expense")}>{editIndex !== null ? 'บันทึกใหม่' : 'รายจ่าย'}</button>
                    </div>
                    {editIndex !== null && <button onClick={()=>{setEditIndex(null); setText(""); setAmount("");}} style={{width:'100%', marginTop:'10px', background:'none', color:'white', opacity:0.6}}>ยกเลิก</button>}
                </div>

                {/* รายการ & ค้นหา */}
                <div className="glass">
                    <input className="search-bar" placeholder="🔍 ค้นหารายการ..." value={search} onChange={e=>setSearch(e.target.value)} />
                    {filteredItems.map((e, i) => (
                        <div key={i} className="item-card">
                            <div style={{display:'flex', flexDirection:'column'}}>
                                <span style={{fontSize:'0.95rem'}}>{e.text}</span>
                                <span className="item-amount" style={{color: e.type==='income'?'#4ade80':'#fb7185'}}>
                                    {e.type==='income'?'+':'-'} {e.amount.toLocaleString()}
                                </span>
                            </div>
                            <div className="actions">
                                <button className="btn-sm" onClick={()=>startEdit(i)}>แก้</button>
                                <button className="btn-sm btn-del" onClick={()=>remove(i)}>ลบ</button>
                            </div>
                        </div>
                    ))}
                    {filteredItems.length === 0 && <div style={{textAlign:'center', opacity:0.4, fontSize:'0.8rem', padding:'20px'}}>ไม่พบข้อมูล</div>}
                </div>
            </div>
        );
    }
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
    </script>
</body>
</html>
