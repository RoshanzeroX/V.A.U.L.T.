<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V.A.U.L.T.</title>
  <link rel="stylesheet" href="style.css" />
  <script src="[unpkg.com](https://unpkg.com/react@18/umd/react.development.js)"></script>
  <script src="[unpkg.com](https://unpkg.com/react-dom@18/umd/react-dom.development.js)"></script>
  <script src="[unpkg.com](https://unpkg.com/@babel/standalone/babel.min.js)"></script>
  <!-- SheetJS สำหรับ Export Excel -->
  <script src="[cdn.sheetjs.com](https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js)"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState, useReducer, useCallback } = React;

    /* ─── utils ─── */
    function fmt(v) { return new Intl.NumberFormat("th-TH").format(v || 0); }
    function monthKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; }
    function monthLabel(m) {
      const [y,mo] = m.split("-").map(Number);
      return new Intl.DateTimeFormat("th-TH",{month:"long",year:"numeric"}).format(new Date(y,mo-1,1));
    }
    function uid() {
      return window.crypto?.randomUUID?.() ?? `e-${Date.now()}-${Math.random().toString(36).slice(2,9)}`;
    }
    function normalise(raw) {
      if (!raw || typeof raw !== "object" || Array.isArray(raw)) return {};
      const out = {};
      Object.entries(raw).forEach(([k,arr]) => {
        if (!Array.isArray(arr)) return;
        out[k] = arr.filter(Boolean).filter(e=>typeof e==="object").map(e=>({
          id:   e.id   || uid(),
          text: typeof e.text==="string" ? e.text : "",
          amount: Number(e.amount)||0,
          type: e.type==="income" ? "income" : "expense",
        }));
      });
      return out;
    }

    /* ─── form reducer ─── */
    const FORM0 = { text:"", amount:"", editId:null };
    function formReducer(s,a){
      switch(a.type){
        case "SET_TEXT":   return {...s, text:a.v};
        case "SET_AMOUNT": return {...s, amount:a.v};
        case "START_EDIT": return { text:a.item.text, amount:String(a.item.amount), editId:a.item.id };
        case "RESET":      return FORM0;
        default:           return s;
      }
    }

    /* ─── LineChart ─── */
    function LineChart({ data, theme }) {
      const ref = useRef(null);
      useEffect(()=>{
        const c = ref.current; if(!c) return;
        const ctx = c.getContext("2d");
        const W=c.width, H=c.height;
        ctx.clearRect(0,0,W,H);
        if(!data.length) return;
        const max=Math.max(...data), min=Math.min(...data), range=(max-min)||1;
        const pts = data.map((v,i)=>({
          x: data.length===1 ? W/2 : (i/(data.length-1))*W,
          y: (H-20) - ((v-min)/range)*(H-30),
        }));
        // stroke
        const sg = ctx.createLinearGradient(0,0,W,0);
        sg.addColorStop(0,"#a78bfa"); sg.addColorStop(0.5,"#38bdf8"); sg.addColorStop(1,"#34d399");
        ctx.beginPath();
        ctx.strokeStyle=sg; ctx.lineWidth=2.5; ctx.lineJoin="round"; ctx.lineCap="round";
        pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
        ctx.stroke();
        // fill
        ctx.beginPath();
        pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
        ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
        const fg=ctx.createLinearGradient(0,0,0,H);
        fg.addColorStop(0,"rgba(167,139,250,0.22)"); fg.addColorStop(1,"rgba(52,211,153,0)");
        ctx.fillStyle=fg; ctx.fill();
      },[data,theme]);
      return <canvas ref={ref} width={480} height={120} style={{width:"100%",height:"100%",display:"block"}} />;
    }

    /* ─── App ─── */
    function App() {
      const today = new Date();
      const [theme,  setTheme]  = useState("dark");
      const [month,  setMonth]  = useState(monthKey(today));
      const [day,    setDay]    = useState(today.getDate());
      const [data,   setData]   = useState({});
      const [form,   dispatch]  = useReducer(formReducer, FORM0);
      const [search, setSearch] = useState("");
      const [notice, setNotice] = useState({type:"",text:""});

      const [y, mo] = month.split("-").map(Number);
      const days = new Date(y, mo, 0).getDate();

      /* theme */
      useEffect(()=>{ document.documentElement.setAttribute("data-theme",theme); },[theme]);

      /* clamp day */
      useEffect(()=>{ if(day>days) setDay(days); },[days]);

      /* load */
      useEffect(()=>{
        const raw = localStorage.getItem(month);
        dispatch({type:"RESET"});
        if(!raw){ setData({}); return; }
        try { setData(normalise(JSON.parse(raw))); }
        catch { setData({}); toast("warning","ข้อมูลเดือนนี้อ่านไม่ได้ ระบบรีเซ็ตให้แล้ว"); }
      },[month]);

      /* save */
      useEffect(()=>{
        try { localStorage.setItem(month, JSON.stringify(data)); }
        catch { toast("error","พื้นที่จัดเก็บเต็ม ไม่สามารถบันทึกได้"); }
      },[data,month]);

      /* auto-clear notice */
      useEffect(()=>{
        if(!notice.text) return;
        const t = setTimeout(()=>setNotice({type:"",text:""}),2600);
        return ()=>clearTimeout(t);
      },[notice]);

      function toast(type,text){ setNotice({type,text}); }

      /* derived */
      const allItems  = useMemo(()=>Object.values(data).flat(),[data]);
      const totalIn   = useMemo(()=>allItems.filter(e=>e.type==="income").reduce((s,e)=>s+e.amount,0),[allItems]);
      const totalOut  = useMemo(()=>allItems.filter(e=>e.type==="expense").reduce((s,e)=>s+e.amount,0),[allItems]);
      const balance   = totalIn - totalOut;

      const chartData = useMemo(()=>{
        let run=0;
        return Array.from({length:days},(_,i)=>{
          run += (data[i+1]||[]).reduce((s,e)=>s+(e.type==="expense"?-e.amount:e.amount),0);
          return run;
        });
      },[data,days]);

      const selectedItems = data[day] || [];
      const editingEntry  = selectedItems.find(e=>e.id===form.editId)||null;
      const filtered      = selectedItems.filter(e=>e.text.toLowerCase().includes(search.toLowerCase()));
      const activeDays    = Object.keys(data).filter(k=>(data[k]||[]).length>0).length;

      /* actions */
      const addOrUpdate = useCallback((type)=>{
        const parsed = Number(form.amount);
        if(!form.amount.trim()){ toast("error","กรุณากรอกจำนวนเงิน"); return; }
        if(isNaN(parsed)||parsed<=0){ toast("error","จำนวนเงินต้องมากกว่า 0"); return; }

        const dayItems = [...(data[day]||[])];
        const item = { id:form.editId||uid(), text:form.text.trim()||(type==="income"?"รายรับ":"รายจ่าย"), amount:parsed, type };

        if(form.editId){
          const idx = dayItems.findIndex(e=>e.id===form.editId);
          if(idx===-1){ toast("error","ไม่พบรายการ"); dispatch({type:"RESET"}); return; }
          dayItems[idx]=item;
        } else { dayItems.push(item); }

        setData(prev=>({...prev,[day]:dayItems}));
        dispatch({type:"RESET"});
        toast("success", form.editId?"อัปเดตเรียบร้อย":"บันทึกเรียบร้อย");
      },[form,data,day]);

      const startEdit = useCallback((id)=>{
        const item=(data[day]||[]).find(e=>e.id===id);
        if(!item){ toast("error","ไม่พบรายการ"); return; }
        dispatch({type:"START_EDIT",item});
      },[data,day]);

      const remove = useCallback((id)=>{
        const items=[...(data[day]||[])];
        const idx=items.findIndex(e=>e.id===id);
        if(idx===-1) return;
        if(!window.confirm("ลบรายการนี้?")) return;
        items.splice(idx,1);
        setData(prev=>{ const n={...prev}; items.length?n[day]=items:delete n[day]; return n; });
        if(form.editId===id) dispatch({type:"RESET"});
        toast("success","ลบเรียบร้อย");
      },[data,day,form.editId]);

      /* Excel export */
      const exportExcel = useCallback(()=>{
        const rows=[["วันที่","รายละเอียด","ประเภท","จำนวนเงิน (บาท)"]];
        Object.keys(data).sort((a,b)=>Number(a)-Number(b)).forEach(dk=>{
          (data[dk]||[]).forEach(item=>{
            rows.push([
              `${month}-${String(dk).padStart(2,"0")}`,
              item.text,
              item.type==="income"?"รายรับ":"รายจ่าย",
              item.amount,
            ]);
          });
        });
        const ws = XLSX.utils.aoa_to_sheet(rows);
        ws["!cols"]=[{wch:16},{wch:28},{wch:12},{wch:20}];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb,ws,monthLabel(month));
        XLSX.writeFile(wb,`vault-${month}.xlsx`);
      },[data,month]);

      /* ─── JSX ─── */
      return (
        <div className="layout">

          {/* ── SIDEBAR ── */}
          <aside className="sidebar glass">
            <div className="brand">
              <span className="brand-dot" />
              <span className="brand-name">V.A.U.L.T.</span>
            </div>

            <button className="theme-btn" onClick={()=>setTheme(t=>t==="dark"?"light":"dark")} aria-label="toggle theme">
              {theme==="dark" ? "☀ Light" : "☾ Dark"}
            </button>

            {/* Balance */}
            <div className="balance-card">
              <span className="balance-label">ยอดคงเหลือ</span>
              <strong className="balance-amount">{fmt(balance)}</strong>
              <span className="balance-unit">บาท</span>
              <span className="balance-month">{monthLabel(month)}</span>
            </div>

            {/* Stats */}
            <div className="side-stats">
              <div className="side-stat">
                <span>รายรับ</span>
                <strong className="c-green">+{fmt(totalIn)}</strong>
              </div>
              <div className="side-stat">
                <span>รายจ่าย</span>
                <strong className="c-red">-{fmt(totalOut)}</strong>
              </div>
              <div className="side-stat">
                <span>วันที่มีรายการ</span>
                <strong>{activeDays}</strong>
              </div>
              <div className="side-stat">
                <span>รายการทั้งหมด</span>
                <strong>{allItems.length}</strong>
              </div>
            </div>

            {/* Month picker */}
            <label className="month-wrap">
              <span>เดือน</span>
              <input type="month" value={month} onChange={e=>setMonth(e.target.value)} />
            </label>

            <button className="export-btn" onClick={exportExcel}>⬇ Export Excel</button>
          </aside>

          {/* ── MAIN ── */}
          <main className="main-col">

            {/* Notice */}
            {notice.text && (
              <div className={`notice notice-${notice.type}`} role="alert">{notice.text}</div>
            )}

            {/* ── TOP ROW: Chart + Form ── */}
            <div className="top-row">

              {/* Chart panel */}
              <div className="glass chart-panel">
                <p className="panel-label">ยอดสะสมรายวัน</p>
                <div className="chart-wrap">
                  <LineChart data={chartData} theme={theme} />
                </div>
              </div>

              {/* Form panel */}
              <div className={`glass form-panel ${form.editId?"is-editing":""}`}>
                <p className="panel-label">{form.editId?"✎ แก้ไขรายการ":`+ เพิ่มรายการ วันที่ ${day}`}</p>

                {editingEntry && (
                  <div className="edit-banner">
                    <span>กำลังแก้ไข: </span><strong>{editingEntry.text}</strong>
                  </div>
                )}

                <input
                  className="field-input"
                  placeholder="รายละเอียด (ไม่บังคับ)"
                  value={form.text}
                  onChange={e=>dispatch({type:"SET_TEXT",v:e.target.value})}
                />
                <input
                  className="field-input"
                  type="number" inputMode="decimal" min="0" step="0.01"
                  placeholder="จำนวนเงิน"
                  value={form.amount}
                  onChange={e=>dispatch({type:"SET_AMOUNT",v:e.target.value})}
                  onKeyDown={e=>{if(e.key==="-"||e.key==="e") e.preventDefault();}}
                />

                <div className="form-actions">
                  <button className="btn-income" onClick={()=>addOrUpdate("income")}>รายรับ</button>
                  <button className="btn-expense" onClick={()=>addOrUpdate("expense")}>รายจ่าย</button>
                  {form.editId && (
                    <button className="btn-cancel" onClick={()=>dispatch({type:"RESET"})}>ยกเลิก</button>
                  )}
                </div>
              </div>
            </div>

            {/* ── BOTTOM ROW: Calendar + List ── */}
            <div className="bottom-row">

              {/* Calendar */}
              <div className="glass cal-panel">
                <p className="panel-label">ปฏิทิน — เลือกวัน</p>
                <div className="day-grid">
                  {Array.from({length:days},(_,i)=>{
                    const d=i+1, active=d===day, hasData=(data[d]||[]).length>0;
                    return (
                      <button
                        key={d} type="button"
                        className={`day-btn ${active?"day-active":""} ${hasData?"day-has":""}`}
                        onClick={()=>{ setDay(d); dispatch({type:"RESET"}); }}
                        aria-label={`วันที่ ${d}`} aria-pressed={active}
                      >
                        {d}
                        {hasData && <span className="day-dot"/>}
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* List */}
              <div className="glass list-panel">
                <div className="list-head">
                  <p className="panel-label" style={{margin:0}}>รายการวันที่ {day}</p>
                  <span className="badge">{selectedItems.length}</span>
                </div>
                <input
                  className="search-input"
                  placeholder="ค้นหา…"
                  value={search}
                  onChange={e=>setSearch(e.target.value)}
                />
                <div className="list-scroll">
                  {filtered.map(item=>(
                    <article key={item.id} className={`item-card ${form.editId===item.id?"item-editing":""}`}>
                      <div className="item-left">
                        <span className={`item-dot ${item.type}`}/>
                        <div>
                          <span className="item-text">{item.text}</span>
                          <span className={`item-tag ${item.type}`}>{item.type==="income"?"รายรับ":"รายจ่าย"}</span>
                        </div>
                      </div>
                      <div className="item-right">
                        <strong className={`item-amount ${item.type}`}>
                          {item.type==="income"?"+":"-"}{fmt(item.amount)}
                        </strong>
                        <div className="item-btns">
                          <button className="ibtn" onClick={()=>startEdit(item.id)} aria-label={`แก้ไข ${item.text}`}>✎</button>
                          <button className="ibtn ibtn-del" onClick={()=>remove(item.id)} aria-label={`ลบ ${item.text}`}>✕</button>
                        </div>
                      </div>
                    </article>
                  ))}
                  {filtered.length===0 && (
                    <div className="empty">
                      <span>—</span>
                      <p>ยังไม่มีรายการ</p>
                    </div>
                  )}
                </div>
              </div>

            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
